<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sardor AI — chatbot</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{ --lapis: #16213e; --lapis-dark: #0d1526; --gold: #c9a227; --cream: #f5eedc; }
  body{ margin:0; background:var(--lapis-dark); font-family:'Manrope',sans-serif; color:var(--cream); }
  .app{ max-width:760px; margin:0 auto; height:100vh; display:flex; flex-direction:column; background:var(--lapis); }
  .messages{ flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:15px; }
  .msg{ max-width:85%; padding:12px; border-radius:12px; white-space:pre-wrap; }
  .msg.user{ align-self:flex-end; background:#2e9e96; color:white; }
  .msg.bot{ align-self:flex-start; background:rgba(255,255,255,0.1); }
  .composer{ padding:20px; display:flex; gap:10px; background:var(--lapis-dark); }
  textarea{ flex:1; padding:10px; border-radius:8px; background:rgba(255,255,255,0.05); color:white; border:1px solid #444; }
  button{ padding:0 20px; background:var(--gold); border:none; border-radius:8px; cursor:pointer; font-weight:bold; }
</style>
</head>
<body>
<div class="app">
  <div class="messages" id="messages"><div class="msg bot">Salom! Savolingizni yozing.</div></div>
  <div class="composer">
    <textarea id="input" rows="1"></textarea>
    <button id="sendBtn">Yuborish</button>
  </div>
</div>
<script>
  const BACKEND_URL = 'https://sardor-saydurasulov-bot.onrender.com/chat';
  let history = [];
  
  async function sendMessage() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if(!text) return;
    
    input.value = '';
    const messages = document.getElementById('messages');
    const userDiv = document.createElement('div');
    userDiv.className = 'msg user';
    userDiv.textContent = text;
    messages.appendChild(userDiv);
    
    history.push({role: 'user', content: text});
    const reducedHistory = history.slice(-2);
    
    try {
      let response = await fetch(BACKEND_URL, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({messages: reducedHistory})
      });
      
      if (response.status === 429) {
        await new Promise(r => setTimeout(r, 3000));
        response = await fetch(BACKEND_URL, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({messages: reducedHistory})
        });
      }
      
      const data = await response.json();
      const reply = data.content ? data.content[0].text : "Xatolik yuz berdi.";
      const botDiv = document.createElement('div');
      botDiv.className = 'msg bot';
      botDiv.textContent = reply;
      messages.appendChild(botDiv);
      history.push({role: 'assistant', content: reply});
    } catch(e) {
      alert("Server band, 5 soniya kutib yana urinib ko'ring.");
    }
  }
  document.getElementById('sendBtn').onclick = sendMessage;
</script>
</body>
</html>
